<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Free, instant QR code generator for links, Wi-Fi, and contact cards. Runs entirely in your browser." />
  <title>Quick QR Code Generator</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><rect width='16' height='16' rx='3' fill='%23111'/><rect x='3' y='3' width='4' height='4' fill='%23fff'/><rect x='9' y='3' width='4' height='4' fill='%23fff'/><rect x='3' y='9' width='4' height='4' fill='%23fff'/></svg>" />
</head>
<body>
  <main class="app">
    <header class="hero">
      <h1>Quick QR Code Generator</h1>
      <p>Paste a link, Wi-Fi password, or contact — get a downloadable QR code instantly. Everything runs in your browser; nothing is uploaded.</p>
    </header>

    <div class="tabs" role="tablist">
      <button class="tab is-active" data-mode="link" role="tab">Link / Text</button>
      <button class="tab" data-mode="wifi" role="tab">Wi-Fi</button>
      <button class="tab" data-mode="contact" role="tab">Contact</button>
    </div>

    <div class="layout">
      <section class="panel">
        <!-- Link / Text -->
        <div class="form" data-form="link">
          <label for="link-input">URL or text</label>
          <input id="link-input" type="text" placeholder="https://example.com" autocomplete="off" />
        </div>

        <!-- Wi-Fi -->
        <div class="form is-hidden" data-form="wifi">
          <label for="wifi-ssid">Network name (SSID)</label>
          <input id="wifi-ssid" type="text" placeholder="MyHomeWiFi" autocomplete="off" />
          <label for="wifi-pass">Password</label>
          <input id="wifi-pass" type="text" placeholder="••••••••" autocomplete="off" />
          <label for="wifi-enc">Security</label>
          <select id="wifi-enc">
            <option value="WPA">WPA / WPA2 / WPA3</option>
            <option value="WEP">WEP</option>
            <option value="nopass">No password</option>
          </select>
          <label class="checkbox"><input id="wifi-hidden" type="checkbox" /> Hidden network</label>
        </div>

        <!-- Contact -->
        <div class="form is-hidden" data-form="contact">
          <label for="c-name">Full name</label>
          <input id="c-name" type="text" placeholder="Jane Doe" autocomplete="off" />
          <label for="c-phone">Phone</label>
          <input id="c-phone" type="text" placeholder="+1 555 123 4567" autocomplete="off" />
          <label for="c-email">Email</label>
          <input id="c-email" type="text" placeholder="jane@example.com" autocomplete="off" />
          <label for="c-org">Organization</label>
          <input id="c-org" type="text" placeholder="Acme Inc." autocomplete="off" />
        </div>

        <div class="options">
          <div class="opt">
            <label for="fg">Color</label>
            <input id="fg" type="color" value="#111111" />
          </div>
          <div class="opt">
            <label for="bg">Background</label>
            <input id="bg" type="color" value="#ffffff" />
          </div>
          <div class="opt">
            <label for="size">Size</label>
            <select id="size">
              <option value="256">256 px</option>
              <option value="512" selected>512 px</option>
              <option value="1024">1024 px</option>
            </select>
          </div>
        </div>
      </section>

      <section class="panel preview">
        <div id="qr" class="qr-box" aria-live="polite"></div>
        <p id="empty-hint" class="hint">Your QR code will appear here.</p>
        <div class="downloads">
          <button id="dl-png" disabled>Download PNG</button>
          <button id="dl-svg" disabled>Download SVG</button>
        </div>
      </section>
    </div>

    <footer class="foot">
      <span>Free &amp; open source · hostable on GitHub Pages</span>
    </footer>
  </main>

  <!-- Lightweight QR library (renders canvas + svg). Vendored locally so it works offline. -->
  <script src="qrcode.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
